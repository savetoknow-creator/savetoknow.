<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Tools | Remove Background, Compress Images, Convert PNG/JPG</title>
  <meta name="description" content="Smart Tools: Remove background, compress images, convert PNG↔JPG easily online. Free tool for everyone.">
  <meta name="keywords" content="remove background, image compression, convert png to jpg, online image tool">
  <style>
    body {
      text-align:center;
      font-family:Arial, sans-serif;
      background:#111;
      color:white;
      padding:50px;
      line-height:1.6;
    }
    h1 { color:#00ff99; margin-bottom:20px; }
    h2 { color:#00cc77; margin-top:40px; }
    input[type="file"], input[type="text"] {
      padding:10px; margin:10px; width:250px; border-radius:5px; border:1px solid #555;
    }
    button {
      padding:10px 20px;
      background:#00ff99;
      color:#111;
      border:none;
      border-radius:5px;
      cursor:pointer;
      transition:0.2s;
      margin-bottom:20px;
    }
    button:hover { background:#00cc77; }
    img { max-width:300px; margin-top:20px; border-radius:5px; }
    hr { margin:50px 0; border:1px solid #333; }
    .tool-section { margin-bottom:50px; }
  </style>
</head>
<body>

  <!-- الصفحة الأصلية -->
  <div class="tool-section">
    <h1>SaveTokNow</h1>
    <p>Paste your link below</p>
    <input placeholder="Paste link here..." id="tiktokInput">
    <br>
    <button onclick="alert('Feature coming soon! 🚀')">Generate</button>
  </div>

  <hr>

  <!-- إزالة الخلفية -->
  <div class="tool-section">
    <h2>Remove Image Background</h2>
    <input type="file" id="imageInput" accept="image/*">
    <br>
    <button onclick="removeBackground()">Remove Background</button>
    <div id="result"></div>
  </div>

  <hr>

  <!-- ضغط الصورة -->
  <div class="tool-section">
    <h2>Compress Image</h2>
    <input type="file" id="compressInput" accept="image/*">
    <br>
    <button onclick="compressImage()">Compress Image</button>
    <div id="compressResult"></div>
  </div>

  <hr>

  <!-- تحويل PNG ↔ JPG -->
  <div class="tool-section">
    <h2>Convert PNG ↔ JPG</h2>
    <input type="file" id="convertInput" accept="image/*">
    <br>
    <button onclick="convertImage()">Convert Image</button>
    <div id="convertResult"></div>
  </div>

<script>
  // ===== إزالة الخلفية =====
  async function removeBackground() {
    const input = document.getElementById('imageInput').files[0];
    if (!input) { alert('Upload an image first!'); return; }

    const reader = new FileReader();
    reader.onload = async function() {
      const imageBase64 = reader.result.split(',')[1];

      const formData = new FormData();
      formData.append('image_file_b64', imageBase64);
      formData.append('size', 'auto');

      try {
        const response = await fetch('https://api.remove.bg/v1.0/removebg', {
          method: 'POST',
          headers: { 'X-Api-Key': 'YOUR_API_KEY_HERE' }, // ضع هنا الـ API Key الخاص بك
          body: formData
        });

        if (!response.ok) throw new Error('Failed to remove background');

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        document.getElementById('result').innerHTML = `<img src="${url}" alt="Result"/>`;
      } catch(err) {
        alert('Error: ' + err.message);
      }
    };
    reader.readAsDataURL(input);
  }

  // ===== ضغط الصورة =====
  function compressImage() {
    const file = document.getElementById('compressInput').files[0];
    if (!file) { alert('Upload an image first!'); return; }

    const reader = new FileReader();
    reader.onload = function() {
      const img = new Image();
      img.src = reader.result;
      img.onload = function() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = img.width / 2; // ضغط 50%
        canvas.height = img.height / 2;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
        document.getElementById('compressResult').innerHTML = `<img src="${dataUrl}"/>`;
      }
    };
    reader.readAsDataURL(file);
  }

  // ===== تحويل PNG ↔ JPG =====
  function convertImage() {
    const file = document.getElementById('convertInput').files[0];
    if (!file) { alert('Upload an image first!'); return; }

    const reader = new FileReader();
    reader.onload = function() {
      const img = new Image();
      img.src = reader.result;
      img.onload = function() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        const newType = file.type === 'image/png' ? 'image/jpeg' : 'image/png';
        const dataUrl = canvas.toDataURL(newType, 0.9);
        document.getElementById('convertResult').innerHTML = `<img src="${dataUrl}"/>`;
      }
    };
    reader.readAsDataURL(file);
  }
</script>

</body>
</html>
